services:
  platform-api:
    build:
      context: ../platform-api
    container_name: rody-grafanacontrolplane-api
    ports:
      - 8081:8081/tcp
    environment:
      PORT: 8081
  grafana:
    user: root
    container_name: 'rody-grafanacontrolplane-app'

    build:
      context: .
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.4.0}
        development: ${DEVELOPMENT:-false}
        anonymous_auth_enabled: ${ANONYMOUS_AUTH_ENABLED:-true}
    ports:
      - 3000:3000/tcp
    volumes:
      - ../dist:/var/lib/grafana/plugins/rody-grafanacontrolplane-app
      - ../provisioning:/etc/grafana/provisioning
      - ..:/root/rody-grafanacontrolplane-app

    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.rody-grafanacontrolplane-app:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: rody-grafanacontrolplane-app
