services:
  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - grafana
      - platform-api
    ports:
      - "${GRAFANA_PORT:-3000}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    environment:
      GF_SERVER_HTTP_PORT: 3000
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DEFAULT_APP_MODE: development
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: rody-grafanacontrol-app
    volumes:
      - grafana-storage:/var/lib/grafana
      - ../grafana-control-plane-plugin-full:/var/lib/grafana/plugins/rody-grafanacontrol-app
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  platform-api:
    image: ${PLATFORM_API_IMAGE:-grafana-control-plane-platform-api:local}
    environment:
      PORT: 8081

volumes:
  grafana-storage:
