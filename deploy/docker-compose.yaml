services:
  gateway:
    image: nginx:1.27-alpine
    container_name: control-plane-gateway
    depends_on:
      - grafana
      - platform-api
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  grafana:
    image: grafana/grafana:latest
    container_name: control-plane-grafana
    environment:
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: rody-grafanacontrolplane-app
    volumes:
      - ../rody-grafanacontrolplane-app/dist:/var/lib/grafana/plugins/rody-grafanacontrolplane-app

  platform-api:
    image: grafana-control-plane-platform-api:local
    container_name: control-plane-api
    environment:
      PORT: 8081
