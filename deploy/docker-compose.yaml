services:
  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - grafana
      - platform-api
    ports:
      - "${GRAFANA_PORT:-3000}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    environment:
      GF_SERVER_HTTP_PORT: 3000
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DEFAULT_APP_MODE: development
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: rody-grafanacontrol-app
    volumes:
      - grafana-storage:/var/lib/grafana
      - ../grafana-control-plane-plugin-full:/var/lib/grafana/plugins/rody-grafanacontrol-app
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-grafana_control_plane}
      MYSQL_USER: ${MYSQL_USER:-platform}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-platform}
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro

  platform-api:
    image: ${PLATFORM_API_IMAGE:-grafana-control-plane-platform-api:local}
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8081
      DATABASE_DSN: ${DATABASE_DSN:-platform:platform@tcp(mysql:3306)/grafana_control_plane?parseTime=true}

volumes:
  grafana-storage:
  mysql-data:
