apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grafana-control-plane.fullname" . }}-gateway
  namespace: {{ include "grafana-control-plane.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "grafana-control-plane.fullname" . }}-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "grafana-control-plane.fullname" . }}-gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.images.gateway }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: gateway-config
          configMap:
            name: {{ include "grafana-control-plane.fullname" . }}-gateway-config
