apiVersion: v1
kind: Service
metadata:
  name: {{ include "grafana-control-plane.fullname" . }}-grafana
  namespace: {{ include "grafana-control-plane.namespace" . }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "grafana-control-plane.fullname" . }}-grafana
  ports:
    - port: {{ .Values.grafana.servicePort }}
      targetPort: {{ .Values.grafana.servicePort }}
      protocol: TCP
      name: http
