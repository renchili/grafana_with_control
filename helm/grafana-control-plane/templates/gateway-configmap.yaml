apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana-control-plane.fullname" . }}-gateway-config
  namespace: {{ include "grafana-control-plane.namespace" . }}
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    server {
      listen 80;
      server_name _;

      location /api/platform/v1/ {
        proxy_pass http://{{ include "grafana-control-plane.fullname" . }}-platform-api:{{ .Values.platformApi.servicePort }}/api/platform/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location = /api/dashboards/db {
        limit_except GET HEAD {
          return 403;
        }
        proxy_pass http://{{ include "grafana-control-plane.fullname" . }}-grafana:{{ .Values.grafana.servicePort }}/api/dashboards/db;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        proxy_pass http://{{ include "grafana-control-plane.fullname" . }}-grafana:{{ .Values.grafana.servicePort }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
      }
    }
