apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grafana-control-plane.fullname" . }}-mysql
  namespace: {{ include "grafana-control-plane.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "grafana-control-plane.fullname" . }}-mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "grafana-control-plane.fullname" . }}-mysql
    spec:
      containers:
        - name: mysql
          image: {{ .Values.images.mysql }}
          ports:
            - containerPort: {{ .Values.mysql.servicePort }}
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.mysql.rootPassword | quote }}
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database | quote }}
            - name: MYSQL_USER
              value: {{ .Values.mysql.user | quote }}
            - name: MYSQL_PASSWORD
              value: {{ .Values.mysql.password | quote }}
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d/001-schema.sql
              subPath: 001-schema.sql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: {{ include "grafana-control-plane.fullname" . }}-mysql-pvc
        - name: mysql-init
          configMap:
            name: {{ include "grafana-control-plane.fullname" . }}-mysql-init
